<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>InvoiceScan — QR Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root {
  --ink: #0d0f14;
  --ink2: #1a1d27;
  --ink3: #22253a;
  --line: rgba(255,255,255,0.07);
  --line2: rgba(255,255,255,0.12);
  --line3: rgba(255,255,255,0.2);
  --text: #e2e4ee;
  --muted: #6b6f85;
  --muted2: #9294a8;
  --lime: #c8f04a;
  --lime-dim: rgba(200,240,74,0.10);
  --cyan: #4af0d4;
  --cyan-dim: rgba(74,240,212,0.09);
  --red: #f04a4a;
  --red-dim: rgba(240,74,74,0.09);
  --amber: #f0b84a;
  --r: 10px;
  --rsm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--ink);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden}
.shell{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.5px}
.logo span{color:var(--lime)}
.auth-pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--line2);color:var(--muted2);cursor:pointer;transition:.18s}
.auth-pill:hover{border-color:var(--line3);color:var(--text)}
.auth-pill.ok{border-color:rgba(200,240,74,0.3);color:var(--lime)}
.adot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.auth-pill.ok .adot{background:var(--lime)}
.nav{display:flex;padding:0 20px 12px;gap:4px;flex-shrink:0}
.nb{flex:1;padding:8px 2px;background:none;border:1px solid var(--line);border-radius:var(--rsm);font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:.15s;letter-spacing:.3px}
.nb:hover{border-color:var(--line2);color:var(--muted2)}
.nb.on{background:var(--lime-dim);border-color:rgba(200,240,74,.35);color:var(--lime)}
.content{flex:1;overflow-y:auto;padding:0 20px 110px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}
.panel{display:none}.panel.on{display:block}

/* SCANNER */
.cam-box{position:relative;border-radius:var(--r);overflow:hidden;background:var(--ink2);border:1px solid var(--line2);aspect-ratio:1}
video{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;inset:0;pointer-events:none}
.finder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:55%;aspect-ratio:1}
.fc{position:absolute;width:22px;height:22px;border-color:var(--lime);border-style:solid;border-width:0}
.fc.tl{top:0;left:0;border-top-width:2.5px;border-left-width:2.5px;border-radius:4px 0 0 0}
.fc.tr{top:0;right:0;border-top-width:2.5px;border-right-width:2.5px;border-radius:0 4px 0 0}
.fc.bl{bottom:0;left:0;border-bottom-width:2.5px;border-left-width:2.5px;border-radius:0 0 0 4px}
.fc.br{bottom:0;right:0;border-bottom-width:2.5px;border-right-width:2.5px;border-radius:0 0 4px 0}
.beam{position:absolute;left:22.5%;right:22.5%;height:1.5px;background:linear-gradient(90deg,transparent,var(--lime),transparent);top:22.5%;animation:bm 2.2s ease-in-out infinite}
@keyframes bm{0%,100%{top:22.5%;opacity:1}50%{top:76%;opacity:.6}}
.cstatus{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(13,15,20,.85));padding:20px 14px 12px;font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:7px}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.pdot.scan{background:var(--lime);animation:blink 1.4s ease-in-out infinite}
.pdot.found{background:var(--cyan)}
@keyframes blink{0%,100%{opacity:1}
